name: nova_project
description: "Nova — a cross-platform crypto dashboard: market, portfolio, and price alerts."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.2
  fl_chart: ^1.2.0
  # hive_ce is the maintained successor to `hive`, which was last published in
  # 2022. Same API, satisfies the locked "Hive" decision.
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  # riverpod (the base package under flutter_riverpod) is a dev dep only so
  # tests can name the `Override` type, which Riverpod 3 exposes via
  # `package:riverpod/misc.dart` rather than the flutter_riverpod barrel.
  riverpod: ^3.3.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Inter is bundled rather than fetched via google_fonts: the app is
  # offline-first, and a network font would leave text unstyled on a cold
  # offline start. Weights match the design (400, 500, 600).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
